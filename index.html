<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1a1a2e">
<title>📝 Mis Notas</title>
<script>
// Genera el manifest como PWA para poder instalar en escritorio
const manifest = {
  name: "Mis Notas",
  short_name: "Notas",
  description: "App de notas estilo sticky notes",
  start_url: "./",
  display: "standalone",
  background_color: "#1a1a2e",
  theme_color: "#e94560",
  orientation: "portrait",
  icons: [
    { src: "data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect width='192' height='192' rx='32' fill='%231a1a2e'/><text y='130' x='30' font-size='120'>📝</text></svg>", sizes: "192x192", type: "image/svg+xml" },
    { src: "data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'><rect width='512' height='512' rx='80' fill='%231a1a2e'/><text y='360' x='60' font-size='320'>📝</text></svg>", sizes: "512x512", type: "image/svg+xml" }
  ]
};
const blob = new Blob([JSON.stringify(manifest)], {type: 'application/json'});
const url  = URL.createObjectURL(blob);
const link = document.createElement('link');
link.rel   = 'manifest';
link.href  = url;
document.currentScript.after(link);
</script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Nunito:wght@400;600;700&display=swap');

  :root {
    --bg: #1a1a2e;
    --surface: #16213e;
    --accent: #e94560;
    --accent2: #f5a623;
    --text: #eaeaea;
    --shadow: rgba(0,0,0,0.5);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    background-image:
      radial-gradient(ellipse at 20% 20%, rgba(233,69,96,0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 80%, rgba(245,166,35,0.06) 0%, transparent 50%);
    min-height: 100vh;
    font-family: 'Nunito', sans-serif;
    overflow: hidden;
    touch-action: none;
  }

  /* ─── HEADER ─── */
  .header {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 1000;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 18px;
    background: rgba(22, 33, 62, 0.95);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(233,69,96,0.2);
  }

  .header h1 {
    font-family: 'Caveat', cursive;
    font-size: 1.6rem;
    color: var(--text);
    letter-spacing: 1px;
  }

  .header h1 span { color: var(--accent); }

  .btn-add {
    width: 44px; height: 44px;
    border-radius: 50%;
    border: none;
    background: var(--accent);
    color: white;
    font-size: 1.6rem;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 15px rgba(233,69,96,0.4);
    transition: transform 0.15s, box-shadow 0.15s;
    flex-shrink: 0;
  }
  .btn-add:active { transform: scale(0.9); box-shadow: 0 2px 8px rgba(233,69,96,0.3); }

  /* ─── CANVAS ─── */
  #canvas {
    position: fixed;
    top: 72px; bottom: 0; left: 0; right: 0;
    overflow: hidden;
    touch-action: none;
  }

  /* ─── NOTA ─── */
  .nota {
    position: absolute;
    width: 200px;
    min-height: 130px;
    border-radius: 14px;
    padding: 10px;
    display: flex;
    flex-direction: column;
    box-shadow: 0 8px 24px var(--shadow), 0 2px 6px rgba(0,0,0,0.3);
    cursor: grab;
    user-select: none;
    -webkit-user-select: none;
    transition: box-shadow 0.2s, transform 0.1s;
    will-change: transform;
  }

  .nota:active { cursor: grabbing; }
  .nota.dragging {
    box-shadow: 0 20px 50px rgba(0,0,0,0.7), 0 6px 16px rgba(0,0,0,0.4);
    transform: rotate(2deg) scale(1.04);
    z-index: 999 !important;
  }

  /* Colores de notas */
  .nota.c0 { background: #ffd166; color: #1a1006; }
  .nota.c1 { background: #ef8c6f; color: #1a0905; }
  .nota.c2 { background: #8ecae6; color: #06131a; }
  .nota.c3 { background: #b5e48c; color: #081a04; }
  .nota.c4 { background: #c77dff; color: #0f0120; }
  .nota.c5 { background: #f9c74f; color: #1a1206; }
  .nota.c6 { background: #90e0ef; color: #041219; }
  .nota.c7 { background: #ffadad; color: #1a0808; }

  /* ─── BARRA SUPERIOR NOTA ─── */
  .nota-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 6px;
    padding-bottom: 5px;
    border-bottom: 1px solid rgba(0,0,0,0.1);
  }

  .nota-drag-hint {
    font-size: 0.65rem;
    opacity: 0.4;
    letter-spacing: 2px;
  }

  .nota-actions { display: flex; gap: 4px; }

  .btn-color, .btn-delete {
    width: 26px; height: 26px;
    border: none;
    border-radius: 50%;
    cursor: pointer;
    font-size: 0.75rem;
    display: flex; align-items: center; justify-content: center;
    background: rgba(0,0,0,0.12);
    transition: background 0.15s, transform 0.1s;
  }
  .btn-color:active, .btn-delete:active { transform: scale(0.85); }
  .btn-delete { background: rgba(200,0,0,0.2); }

  /* ─── TEXTAREA ─── */
  .nota textarea {
    flex: 1;
    border: none;
    background: transparent;
    resize: none;
    font-family: 'Caveat', cursive;
    font-size: 1.05rem;
    font-weight: 600;
    color: inherit;
    outline: none;
    line-height: 1.4;
    min-height: 80px;
    padding: 2px 0;
    -webkit-user-select: text;
    user-select: text;
  }

  .nota textarea::placeholder { opacity: 0.45; font-weight: 400; }

  /* ─── RESIZE HANDLE ─── */
  .nota-resize {
    width: 16px; height: 16px;
    position: absolute;
    bottom: 4px; right: 4px;
    cursor: nwse-resize;
    opacity: 0.3;
    font-size: 0.6rem;
    display: flex; align-items: center; justify-content: center;
    touch-action: none;
  }

  /* ─── VACÍO ─── */
  .empty-hint {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    color: rgba(234,234,234,0.2);
    pointer-events: none;
    transition: opacity 0.4s;
  }
  .empty-hint .big { font-size: 4rem; margin-bottom: 10px; }
  .empty-hint p { font-family: 'Caveat', cursive; font-size: 1.3rem; }

  /* ─── MODAL COLOR ─── */
  .color-picker {
    position: fixed;
    z-index: 2000;
    background: rgba(22,33,62,0.97);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 16px;
    padding: 14px;
    display: none;
    flex-wrap: wrap;
    gap: 8px;
    width: 160px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.6);
  }
  .color-picker.show { display: flex; }
  .color-dot {
    width: 32px; height: 32px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.2);
    cursor: pointer;
    transition: transform 0.15s, border-color 0.15s;
  }
  .color-dot:active { transform: scale(0.85); }

  /* ─── TOAST ─── */
  .toast {
    position: fixed;
    bottom: 30px; left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: rgba(233,69,96,0.9);
    color: white;
    padding: 10px 20px;
    border-radius: 30px;
    font-size: 0.85rem;
    font-weight: 600;
    transition: transform 0.3s;
    z-index: 3000;
    pointer-events: none;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<!-- HEADER -->
<header class="header">
  <h1>📝 Mis <span>Notas</span></h1>
  <button class="btn-add" onclick="crearNota()" title="Nueva nota">＋</button>
</header>

<!-- CANVAS -->
<div id="canvas"></div>

<!-- HINT VACÍO -->
<div class="empty-hint" id="emptyHint">
  <div class="big">📋</div>
  <p>Toca <strong>＋</strong> para crear<br>tu primera nota</p>
</div>

<!-- SELECTOR DE COLOR -->
<div class="color-picker" id="colorPicker"></div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ══════════════════════════════════════════
//  ESTADO
// ══════════════════════════════════════════
const COLORS = ['#ffd166','#ef8c6f','#8ecae6','#b5e48c','#c77dff','#f9c74f','#90e0ef','#ffadad'];
let notas = [];
let zCounter = 100;
let activeColorNota = null;

const canvas    = document.getElementById('canvas');
const picker    = document.getElementById('colorPicker');
const emptyHint = document.getElementById('emptyHint');

// ══════════════════════════════════════════
//  PERSISTENCIA (localStorage)
// ══════════════════════════════════════════
function guardar() {
  try { localStorage.setItem('mis_notas_v2', JSON.stringify(notas)); } catch(e) {}
}

function cargar() {
  try {
    const data = localStorage.getItem('mis_notas_v2');
    if (data) {
      notas = JSON.parse(data);
      notas.forEach(n => renderNota(n));
      actualizarHint();
    }
  } catch(e) { notas = []; }
}

// ══════════════════════════════════════════
//  CREAR NOTA
// ══════════════════════════════════════════
function crearNota() {
  const cw = canvas.clientWidth, ch = canvas.clientHeight;
  const colorIdx = Math.floor(Math.random() * COLORS.length);
  const nota = {
    id: Date.now(),
    texto: '',
    x: Math.max(10, Math.min(cw - 220, 20 + Math.random() * (cw - 240))),
    y: Math.max(10, Math.min(ch - 160, 20 + Math.random() * (ch - 200))),
    w: 200,
    h: 140,
    colorIdx,
    z: ++zCounter
  };
  notas.push(nota);
  renderNota(nota);
  guardar();
  actualizarHint();

  // focus en el textarea de la nueva nota
  const el = document.getElementById('nota-' + nota.id);
  if (el) setTimeout(() => el.querySelector('textarea').focus(), 80);
}

// ══════════════════════════════════════════
//  RENDER NOTA
// ══════════════════════════════════════════
function renderNota(nota) {
  // Si ya existe, actualizar
  let el = document.getElementById('nota-' + nota.id);
  if (el) {
    el.style.left   = nota.x + 'px';
    el.style.top    = nota.y + 'px';
    el.style.width  = nota.w + 'px';
    el.style.height = nota.h + 'px';
    el.style.zIndex = nota.z;
    el.className    = 'nota c' + nota.colorIdx;
    el.querySelector('textarea').value = nota.texto;
    return;
  }

  el = document.createElement('div');
  el.id = 'nota-' + nota.id;
  el.className = 'nota c' + nota.colorIdx;
  el.style.cssText = `left:${nota.x}px;top:${nota.y}px;width:${nota.w}px;height:${nota.h}px;z-index:${nota.z}`;

  el.innerHTML = `
    <div class="nota-top">
      <span class="nota-drag-hint">⠿⠿</span>
      <div class="nota-actions">
        <button class="btn-color" title="Color">🎨</button>
        <button class="btn-delete" title="Eliminar">✕</button>
      </div>
    </div>
    <textarea placeholder="Escribe aquí..."></textarea>
    <div class="nota-resize">⟳</div>
  `;

  // Textarea → guardar
  const ta = el.querySelector('textarea');
  ta.value = nota.texto;
  ta.addEventListener('input', () => {
    nota.texto = ta.value;
    guardar();
  });
  // Evitar que el tap en textarea inicie drag
  ta.addEventListener('touchstart', e => e.stopPropagation(), {passive: true});
  ta.addEventListener('mousedown',  e => e.stopPropagation());

  // Botón color
  el.querySelector('.btn-color').addEventListener('click', (e) => {
    e.stopPropagation();
    abrirColorPicker(nota, el, e);
  });
  el.querySelector('.btn-color').addEventListener('touchend', (e) => {
    e.stopPropagation();
    const r = el.querySelector('.btn-color').getBoundingClientRect();
    abrirColorPickerPos(nota, el, r.left, r.bottom);
  });

  // Botón eliminar
  el.querySelector('.btn-delete').addEventListener('click', () => eliminarNota(nota.id));
  el.querySelector('.btn-delete').addEventListener('touchend', (e) => {
    e.preventDefault(); eliminarNota(nota.id);
  });

  // Arrastrar (touch + mouse)
  iniciarDrag(el, nota);

  // Redimensionar
  iniciarResize(el.querySelector('.nota-resize'), el, nota);

  canvas.appendChild(el);
}

// ══════════════════════════════════════════
//  DRAG
// ══════════════════════════════════════════
function iniciarDrag(el, nota) {
  let startX, startY, origX, origY, dragging = false;

  function onStart(cx, cy) {
    startX = cx; startY = cy;
    origX  = nota.x; origY = nota.y;
    nota.z = ++zCounter;
    el.style.zIndex = nota.z;
    dragging = true;
    el.classList.add('dragging');
  }

  function onMove(cx, cy) {
    if (!dragging) return;
    const dx = cx - startX, dy = cy - startY;
    const cw = canvas.clientWidth, ch = canvas.clientHeight;
    nota.x = Math.max(0, Math.min(cw - nota.w, origX + dx));
    nota.y = Math.max(0, Math.min(ch - nota.h, origY + dy));
    el.style.left = nota.x + 'px';
    el.style.top  = nota.y + 'px';
  }

  function onEnd() {
    if (!dragging) return;
    dragging = false;
    el.classList.remove('dragging');
    guardar();
  }

  // TOUCH
  el.addEventListener('touchstart', (e) => {
    if (e.target.tagName === 'TEXTAREA' || e.target.tagName === 'BUTTON') return;
    const t = e.touches[0];
    onStart(t.clientX, t.clientY);
  }, {passive: true});

  document.addEventListener('touchmove', (e) => {
    if (!dragging) return;
    e.preventDefault();
    const t = e.touches[0];
    onMove(t.clientX, t.clientY);
  }, {passive: false});

  document.addEventListener('touchend', onEnd);

  // MOUSE
  el.addEventListener('mousedown', (e) => {
    if (e.target.tagName === 'TEXTAREA' || e.target.tagName === 'BUTTON') return;
    onStart(e.clientX, e.clientY);
  });

  document.addEventListener('mousemove', (e) => {
    if (!dragging) return;
    onMove(e.clientX, e.clientY);
  });

  document.addEventListener('mouseup', onEnd);
}

// ══════════════════════════════════════════
//  RESIZE
// ══════════════════════════════════════════
function iniciarResize(handle, el, nota) {
  let startX, startY, origW, origH, resizing = false;

  function onStart(cx, cy) {
    startX = cx; startY = cy;
    origW  = nota.w; origH = nota.h;
    resizing = true;
    nota.z = ++zCounter;
    el.style.zIndex = nota.z;
  }

  function onMove(cx, cy) {
    if (!resizing) return;
    nota.w = Math.max(140, origW + (cx - startX));
    nota.h = Math.max(100, origH + (cy - startY));
    el.style.width  = nota.w + 'px';
    el.style.height = nota.h + 'px';
  }

  function onEnd() {
    if (!resizing) return;
    resizing = false;
    guardar();
  }

  handle.addEventListener('touchstart', (e) => {
    e.stopPropagation(); e.preventDefault();
    const t = e.touches[0];
    onStart(t.clientX, t.clientY);
  }, {passive: false});

  document.addEventListener('touchmove', (e) => {
    if (!resizing) return;
    e.preventDefault();
    const t = e.touches[0];
    onMove(t.clientX, t.clientY);
  }, {passive: false});

  document.addEventListener('touchend', () => { if (resizing) onEnd(); });

  handle.addEventListener('mousedown', (e) => {
    e.stopPropagation(); onStart(e.clientX, e.clientY);
  });
  document.addEventListener('mousemove', (e) => { if (resizing) onMove(e.clientX, e.clientY); });
  document.addEventListener('mouseup',   () => { if (resizing) onEnd(); });
}

// ══════════════════════════════════════════
//  ELIMINAR
// ══════════════════════════════════════════
function eliminarNota(id) {
  const el = document.getElementById('nota-' + id);
  if (el) {
    el.style.transition = 'opacity 0.2s, transform 0.2s';
    el.style.opacity = '0';
    el.style.transform = 'scale(0.8)';
    setTimeout(() => { el.remove(); actualizarHint(); }, 220);
  }
  notas = notas.filter(n => n.id !== id);
  guardar();
  mostrarToast('Nota eliminada');
}

// ══════════════════════════════════════════
//  COLOR PICKER
// ══════════════════════════════════════════
function buildColorPicker() {
  picker.innerHTML = '';
  COLORS.forEach((c, i) => {
    const dot = document.createElement('div');
    dot.className = 'color-dot';
    dot.style.background = c;
    dot.addEventListener('click',    () => aplicarColor(i));
    dot.addEventListener('touchend', (e) => { e.preventDefault(); aplicarColor(i); });
    picker.appendChild(dot);
  });
}

function abrirColorPicker(nota, el, e) {
  activeColorNota = nota;
  const rect = el.getBoundingClientRect();
  abrirColorPickerPos(nota, el, rect.right - 160, rect.top + 40);
}

function abrirColorPickerPos(nota, el, x, y) {
  activeColorNota = nota;
  const cw = window.innerWidth, ch = window.innerHeight;
  picker.style.left = Math.max(8, Math.min(cw - 170, x)) + 'px';
  picker.style.top  = Math.max(80, Math.min(ch - 180, y)) + 'px';
  picker.classList.add('show');
}

function aplicarColor(idx) {
  if (!activeColorNota) return;
  activeColorNota.colorIdx = idx;
  const el = document.getElementById('nota-' + activeColorNota.id);
  if (el) {
    el.className = 'nota c' + idx;
  }
  guardar();
  picker.classList.remove('show');
  activeColorNota = null;
}

// Cerrar picker al tocar fuera
document.addEventListener('click', (e) => {
  if (!picker.contains(e.target) && !e.target.classList.contains('btn-color')) {
    picker.classList.remove('show');
  }
});
document.addEventListener('touchend', (e) => {
  if (!picker.contains(e.target) && !e.target.classList.contains('btn-color')) {
    picker.classList.remove('show');
  }
});

// ══════════════════════════════════════════
//  HINT & TOAST
// ══════════════════════════════════════════
function actualizarHint() {
  emptyHint.style.opacity = notas.length === 0 ? '1' : '0';
}

let toastTimer;
function mostrarToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2000);
}

// ══════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════
buildColorPicker();
cargar();
</script>
</body>
</html>
