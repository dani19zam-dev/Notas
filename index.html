<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#202124">
<title>Mis Notas</title>
<link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#202124;--surface:#2d2e30;--surface2:#3c3f43;
  --text:#e8eaed;--text2:#9aa0a6;--accent:#8ab4f8;--radius:10px;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);
  font-family:'Roboto',sans-serif;touch-action:none}

/* ══ TOPBAR ══ */
.topbar{
  position:fixed;top:0;left:0;right:0;z-index:500;height:58px;
  background:rgba(32,33,36,.97);backdrop-filter:blur(8px);
  border-bottom:1px solid rgba(255,255,255,.07);
  display:flex;align-items:center;gap:10px;padding:0 12px;
}
.logo{font-family:'Google Sans',sans-serif;font-size:1.15rem;font-weight:500;
  color:var(--text);display:flex;align-items:center;gap:5px;flex-shrink:0}
.logo em{color:#fbbc04;font-style:normal}
.search-wrap{flex:1;background:var(--surface2);border-radius:24px;
  display:flex;align-items:center;padding:0 12px;gap:6px;height:36px;
  transition:background .2s}
.search-wrap:focus-within{background:#3c4043}
.search-wrap input{flex:1;background:transparent;border:none;color:var(--text);
  font-size:.88rem;outline:none;font-family:'Roboto',sans-serif}
.search-wrap input::placeholder{color:var(--text2)}
.icon-btn{width:36px;height:36px;border-radius:50%;border:none;
  background:transparent;color:var(--text2);font-size:.95rem;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:background .15s;flex-shrink:0}
.icon-btn:active{background:var(--surface2);color:var(--text)}

/* ══ CANVAS ══ */
#canvas{
  position:fixed;top:58px;bottom:0;left:0;right:0;
  overflow:hidden;touch-action:none;
}

/* ══ NOTA ══ */
.nota{
  position:absolute;width:220px;min-height:100px;
  border-radius:var(--radius);border:1px solid rgba(255,255,255,.12);
  background:var(--surface);padding:0;
  display:flex;flex-direction:column;
  box-shadow:0 2px 10px rgba(0,0,0,.4);
  cursor:pointer;user-select:none;-webkit-user-select:none;
  transition:box-shadow .2s,transform .15s;
  will-change:transform;overflow:hidden;
}
.nota.dragging{
  box-shadow:0 16px 48px rgba(0,0,0,.7)!important;
  transform:scale(1.04) rotate(1deg)!important;
  z-index:400!important;transition:none!important;
}

/* Colores sólidos */
.nc-coral   {background:#5c2b29!important;border-color:#7a3a38!important}
.nc-peach   {background:#614a19!important;border-color:#7a5f28!important}
.nc-sand    {background:#635d19!important;border-color:#7a7228!important}
.nc-sage    {background:#345920!important;border-color:#456e30!important}
.nc-fog     {background:#16504b!important;border-color:#256560!important}
.nc-storm   {background:#2d555e!important;border-color:#3c6a74!important}
.nc-denim   {background:#1e3a5f!important;border-color:#2c4f7a!important}
.nc-grape   {background:#42275e!important;border-color:#573574!important}
.nc-rose    {background:#5b2245!important;border-color:#72305a!important}
.nc-cocoa   {background:#442f19!important;border-color:#5a4028!important}
.nc-slate   {background:#3c3f43!important;border-color:#505358!important}

/* Temas */
.nt-groceries  {background:linear-gradient(145deg,#1a3a2a,#0d5c3a)!important}
.nt-tomatoes   {background:linear-gradient(145deg,#4a1a1a,#8b2a2a)!important}
.nt-cooking    {background:linear-gradient(145deg,#3a2a1a,#8b5a2a)!important}
.nt-music      {background:linear-gradient(145deg,#1a1a4a,#2a2a8b)!important}
.nt-travel     {background:linear-gradient(145deg,#1a2a4a,#2a5a8b)!important}
.nt-recipe     {background:linear-gradient(145deg,#2a1a3a,#6a2a8b)!important}
.nt-celebration{background:radial-gradient(ellipse at top,#3a1a4a,#1a0a2a)!important}
.nt-nature     {background:linear-gradient(145deg,#1a2a1a,#2a4a2a)!important}

/* ── Cabecera de la nota (zona de drag) ── */
.nota-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:7px 8px 5px;
  border-bottom:1px solid rgba(255,255,255,.07);
  cursor:grab;flex-shrink:0;
  touch-action:none;
}
.nota-head:active{cursor:grabbing}
.nota-drag{display:flex;gap:2px;align-items:center}
.nota-drag span{width:3px;height:3px;border-radius:50%;background:rgba(255,255,255,.3)}
.nota-pin{font-size:.75rem;opacity:.7;display:none}
.nota.pinned .nota-pin{display:block}
.nota-menu-btn{
  width:26px;height:26px;border-radius:50%;border:none;
  background:transparent;color:var(--text2);font-size:.8rem;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:background .12s;flex-shrink:0;
}
.nota-menu-btn:active{background:rgba(255,255,255,.12);color:var(--text)}

/* ── Cuerpo ── */
.nota-body{padding:8px 10px;flex:1;overflow:hidden}
.nota-title{font-family:'Google Sans',sans-serif;font-size:.9rem;font-weight:500;
  color:var(--text);margin-bottom:4px;word-break:break-word}
.nota-text{font-size:.8rem;color:var(--text);opacity:.88;line-height:1.5;
  max-height:160px;overflow:hidden;word-break:break-word}
.nota-text b,.nota-text strong{font-weight:700}
.nota-text i,.nota-text em{font-style:italic}
.nota-text u{text-decoration:underline}
.nota-text s{text-decoration:line-through}
.nota-text h1{font-size:1rem;font-weight:700}
.nota-text h2{font-size:.9rem;font-weight:700}
.nota-text h3{font-size:.83rem;font-weight:700}
.nota-text ul{padding-left:14px}

/* ── Acciones rápidas ── */
.nota-actions{
  display:flex;gap:2px;padding:4px 6px;
  border-top:1px solid rgba(255,255,255,.06);flex-shrink:0;
}
.nota-btn{
  width:28px;height:28px;border-radius:50%;border:none;
  background:transparent;color:var(--text2);font-size:.75rem;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:background .12s;
}
.nota-btn:active{background:rgba(255,255,255,.12);color:var(--text)}
.nota-spacer{flex:1}

/* ══ FAB ══ */
.fab{
  position:fixed;bottom:22px;right:18px;z-index:500;
  width:54px;height:54px;border-radius:16px;
  background:var(--surface2);border:1px solid rgba(255,255,255,.15);
  color:var(--text);font-size:1.5rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 20px rgba(0,0,0,.5);transition:transform .12s;
}
.fab:active{transform:scale(.9)}

/* ══ EMPTY ══ */
.empty-hint{
  position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  text-align:center;color:rgba(255,255,255,.18);pointer-events:none;
}
.empty-hint .ei{font-size:3.5rem;margin-bottom:12px}
.empty-hint p{font-family:'Google Sans',sans-serif;font-size:1rem}

/* ══ OVERLAY EDITOR ══ */
.overlay{
  position:fixed;inset:0;z-index:600;
  background:rgba(0,0,0,.65);
  display:none;align-items:flex-end;
}
.overlay.open{display:flex}

/* ══ EDITOR ══ */
.editor{
  width:100%;max-height:96vh;border-radius:18px 18px 0 0;
  background:var(--surface);border-top:1px solid rgba(255,255,255,.1);
  display:flex;flex-direction:column;
  animation:slideUp .22s cubic-bezier(.4,0,.2,1);overflow:hidden;
}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}

/* Colores editor */
.editor.ec-coral   {background:#5c2b29}
.editor.ec-peach   {background:#614a19}
.editor.ec-sand    {background:#635d19}
.editor.ec-sage    {background:#345920}
.editor.ec-fog     {background:#16504b}
.editor.ec-storm   {background:#2d555e}
.editor.ec-denim   {background:#1e3a5f}
.editor.ec-grape   {background:#42275e}
.editor.ec-rose    {background:#5b2245}
.editor.ec-cocoa   {background:#442f19}
.editor.ec-slate   {background:#3c3f43}
.editor.et-groceries  {background:linear-gradient(145deg,#1a3a2a,#0d5c3a)}
.editor.et-tomatoes   {background:linear-gradient(145deg,#4a1a1a,#8b2a2a)}
.editor.et-cooking    {background:linear-gradient(145deg,#3a2a1a,#8b5a2a)}
.editor.et-music      {background:linear-gradient(145deg,#1a1a4a,#2a2a8b)}
.editor.et-travel     {background:linear-gradient(145deg,#1a2a4a,#2a5a8b)}
.editor.et-recipe     {background:linear-gradient(145deg,#2a1a3a,#6a2a8b)}
.editor.et-celebration{background:radial-gradient(ellipse at top,#3a1a4a,#1a0a2a)}
.editor.et-nature     {background:linear-gradient(145deg,#1a2a1a,#2a4a2a)}

.drag-bar{display:flex;justify-content:center;padding:8px 0 2px;cursor:grab;flex-shrink:0}
.drag-bar span{width:38px;height:4px;border-radius:2px;background:rgba(255,255,255,.2)}

.editor-scroll{overflow-y:auto;flex:1;padding:12px 14px 4px}
.e-title{width:100%;background:transparent;border:none;outline:none;
  font-family:'Google Sans',sans-serif;font-size:1.05rem;font-weight:500;
  color:var(--text);margin-bottom:8px;caret-color:var(--accent)}
.e-title::placeholder{color:var(--text2)}
.e-body{width:100%;min-height:110px;outline:none;color:var(--text);
  font-family:'Roboto',sans-serif;font-size:.92rem;line-height:1.6;
  caret-color:var(--accent);word-break:break-word;}
.e-body:empty::before{content:attr(data-placeholder);color:var(--text2);pointer-events:none}
.e-body b,.e-body strong{font-weight:700}
.e-body i,.e-body em{font-style:italic}
.e-body u{text-decoration:underline}
.e-body s{text-decoration:line-through}
.e-body h1{font-size:1.25rem;font-weight:700;margin:3px 0}
.e-body h2{font-size:1.05rem;font-weight:700;margin:3px 0}
.e-body h3{font-size:.93rem;font-weight:700;margin:3px 0}
.e-body ul{padding-left:18px;margin:3px 0}
.e-body li{margin-bottom:2px}

/* ── FORMAT BAR ── */
.format-bar{
  display:flex;align-items:center;gap:1px;padding:3px 8px;
  border-top:1px solid rgba(255,255,255,.08);
  overflow-x:auto;scrollbar-width:none;flex-shrink:0;
}
.format-bar::-webkit-scrollbar{display:none}
.fmt-btn{
  min-width:34px;height:32px;border-radius:6px;border:none;
  background:transparent;color:var(--text2);font-size:.82rem;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-family:'Roboto',sans-serif;font-weight:500;flex-shrink:0;
  transition:background .1s,color .1s;
}
.fmt-btn:active,.fmt-btn.on{background:rgba(138,180,248,.18);color:var(--accent)}
.fmt-sep{width:1px;height:18px;background:rgba(255,255,255,.12);margin:0 2px;flex-shrink:0}

/* ── COLOR/TEMA PANEL ── */
.ct-panel{
  display:none;flex-direction:column;
  border-top:1px solid rgba(255,255,255,.08);
  max-height:220px;overflow-y:auto;scrollbar-width:none;
}
.ct-panel::-webkit-scrollbar{display:none}
.ct-panel.open{display:flex}
.ct-label{font-size:.65rem;font-weight:500;letter-spacing:1.2px;
  color:var(--text2);text-transform:uppercase;padding:8px 14px 5px;flex-shrink:0}
.ct-row{display:flex;gap:7px;padding:0 14px 10px;overflow-x:auto;scrollbar-width:none;flex-shrink:0}
.ct-row::-webkit-scrollbar{display:none}
.cp-dot{
  width:32px;height:32px;border-radius:50%;flex-shrink:0;
  border:2px solid transparent;cursor:pointer;position:relative;
  transition:transform .12s,border-color .12s;
}
.cp-dot:active{transform:scale(.82)}
.cp-dot.active{border-color:#fff!important}
.cp-none{background:var(--surface2)!important;border:2px solid rgba(255,255,255,.25)!important}
.cp-none::after{content:'✕';position:absolute;inset:0;display:flex;align-items:center;
  justify-content:center;font-size:.7rem;color:rgba(255,255,255,.4)}
.th-dot{
  width:42px;height:42px;border-radius:8px;flex-shrink:0;
  border:2px solid transparent;cursor:pointer;
  display:flex;align-items:center;justify-content:center;font-size:1.2rem;
  transition:transform .12s,border-color .12s;
}
.th-dot:active{transform:scale(.82)}
.th-dot.active{border-color:#fff!important}

/* ── EDITOR BOTTOM BAR ── */
.editor-bar{
  display:flex;align-items:center;gap:2px;
  padding:5px 10px;border-top:1px solid rgba(255,255,255,.07);flex-shrink:0;
}
.editor-bar .sp{flex:1}
.btn-close{font-family:'Roboto',sans-serif;font-size:.83rem;font-weight:500;
  color:var(--text2);background:transparent;border:none;
  padding:8px 12px;border-radius:4px;cursor:pointer;transition:background .12s}
.btn-close:active{background:rgba(255,255,255,.08);color:var(--text)}

/* ══ BACKUP MODAL ══ */
.bk-overlay{position:fixed;inset:0;z-index:700;background:rgba(0,0,0,.7);
  display:none;align-items:center;justify-content:center;padding:20px}
.bk-overlay.open{display:flex}
.bk-modal{background:#2d2e30;border-radius:16px;padding:22px;
  width:100%;max-width:320px;border:1px solid rgba(255,255,255,.1)}
.bk-modal h3{font-family:'Google Sans',sans-serif;font-size:1rem;
  color:var(--text);margin-bottom:6px;text-align:center}
.bk-info{font-size:.76rem;color:var(--text2);text-align:center;
  margin-bottom:14px;line-height:1.5}
.bk-btn{width:100%;padding:12px;border-radius:8px;border:none;
  font-size:.9rem;font-weight:500;cursor:pointer;margin-bottom:8px;
  display:flex;align-items:center;justify-content:center;gap:8px;
  font-family:'Roboto',sans-serif;transition:opacity .12s}
.bk-btn:active{opacity:.8}
.bk-ex{background:#1a73e8;color:#fff}
.bk-im{background:var(--surface2);color:var(--text);border:1px solid rgba(255,255,255,.12)}
.bk-ca{background:transparent;color:var(--text2)}

/* ══ TOAST ══ */
.toast{position:fixed;bottom:84px;left:50%;
  transform:translateX(-50%) translateY(14px);
  background:#3c4043;color:var(--text);padding:9px 18px;
  border-radius:8px;font-size:.82rem;font-weight:500;
  opacity:0;pointer-events:none;z-index:800;white-space:nowrap;
  transition:opacity .2s,transform .2s;box-shadow:0 4px 16px rgba(0,0,0,.4)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<!-- TOPBAR -->
<header class="topbar">
  <div class="logo">📝 <em>Keep</em></div>
  <div class="search-wrap">
    <span style="color:var(--text2);font-size:.85rem">🔍</span>
    <input id="searchInput" type="text" placeholder="Buscar notas" autocomplete="off">
  </div>
  <button class="icon-btn" onclick="openBackup()">💾</button>
</header>

<!-- CANVAS -->
<div id="canvas"></div>

<!-- EMPTY -->
<div class="empty-hint" id="emptyHint">
  <div class="ei">💡</div>
  <p>Toca <strong>＋</strong> para crear<br>tu primera nota</p>
</div>

<!-- FAB -->
<button class="fab" onclick="openEditor(null)">＋</button>

<!-- EDITOR OVERLAY -->
<div class="overlay" id="overlay" onclick="handleOverlayClick(event)">
  <div class="editor" id="editor">
    <div class="drag-bar"><span></span></div>
    <div class="editor-scroll">
      <input class="e-title" id="eTitle" type="text" placeholder="Título" autocomplete="off">
      <div class="e-body" id="eBody" contenteditable="true" data-placeholder="Escribe una nota..."></div>
    </div>

    <!-- Formato -->
    <div class="format-bar">
      <button class="fmt-btn" data-cmd="bold"          onclick="fmt('bold')"><b>N</b></button>
      <button class="fmt-btn" data-cmd="italic"        onclick="fmt('italic')"><i>K</i></button>
      <button class="fmt-btn" data-cmd="underline"     onclick="fmt('underline')"><u>S</u></button>
      <button class="fmt-btn" data-cmd="strikeThrough" onclick="fmt('strikeThrough')"><s>T</s></button>
      <div class="fmt-sep"></div>
      <button class="fmt-btn" onclick="fmtBlock('h1')">H1</button>
      <button class="fmt-btn" onclick="fmtBlock('h2')">H2</button>
      <button class="fmt-btn" onclick="fmtBlock('h3')">H3</button>
      <div class="fmt-sep"></div>
      <button class="fmt-btn" onclick="fmt('insertUnorderedList')">≡</button>
      <button class="fmt-btn" onclick="fmt('justifyLeft')">⬅</button>
      <button class="fmt-btn" onclick="fmt('justifyCenter')">☰</button>
      <button class="fmt-btn" onclick="fmt('justifyRight')">➡</button>
      <div class="fmt-sep"></div>
      <button class="fmt-btn" onclick="fmt('removeFormat')">✕</button>
    </div>

    <!-- Color/Tema -->
    <div class="ct-panel" id="ctPanel">
      <div class="ct-label">Color</div>
      <div class="ct-row" id="colorsRow"></div>
      <div class="ct-label">Tema</div>
      <div class="ct-row" id="themesRow"></div>
    </div>

    <!-- Barra acciones -->
    <div class="editor-bar">
      <button class="icon-btn fmt-btn" id="btnPin" title="Fijar" onclick="togglePin()">📌</button>
      <button class="icon-btn fmt-btn" title="Color/Tema" onclick="toggleCtPanel()">🎨</button>
      <button class="icon-btn fmt-btn" id="btnDel" title="Eliminar" onclick="deleteCurrentNote()" style="display:none">🗑️</button>
      <div class="sp"></div>
      <button class="btn-close" onclick="closeEditor()">Cerrar</button>
    </div>
  </div>
</div>

<!-- BACKUP -->
<div class="bk-overlay" id="bkOverlay" onclick="if(event.target===this)closeBackup()">
  <div class="bk-modal">
    <h3>💾 Copia de seguridad</h3>
    <p class="bk-info">Guarda tus notas en un archivo o recupera una copia anterior.</p>
    <button class="bk-btn bk-ex" onclick="exportNotes()">📤 Exportar (.json)</button>
    <button class="bk-btn bk-im" onclick="document.getElementById('importFile').click()">📥 Importar</button>
    <input type="file" id="importFile" accept=".json" onchange="importNotes(event)" style="display:none">
    <button class="bk-btn bk-ca" onclick="closeBackup()">Cancelar</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ══════════════════════════════════════════════════
//  CONFIGURACIÓN
// ══════════════════════════════════════════════════
const COLORS = [
  {id:'none',  bg:null},
  {id:'coral', bg:'#b5423a'},{id:'peach',bg:'#c97a1a'},
  {id:'sand',  bg:'#c4a015'},{id:'sage', bg:'#4a7c2b'},
  {id:'fog',   bg:'#0f766e'},{id:'storm',bg:'#0e7490'},
  {id:'denim', bg:'#2563eb'},{id:'grape',bg:'#7c3aed'},
  {id:'rose',  bg:'#be185d'},{id:'cocoa',bg:'#78350f'},
  {id:'slate', bg:'#4b5563'},
];
const THEMES = [
  {id:'none',        icon:'🚫', grad:null},
  {id:'groceries',   icon:'🛒', grad:'linear-gradient(145deg,#1a3a2a,#0d5c3a)'},
  {id:'tomatoes',    icon:'🍅', grad:'linear-gradient(145deg,#4a1a1a,#8b2a2a)'},
  {id:'cooking',     icon:'🍳', grad:'linear-gradient(145deg,#3a2a1a,#8b5a2a)'},
  {id:'music',       icon:'🎵', grad:'linear-gradient(145deg,#1a1a4a,#2a2a8b)'},
  {id:'travel',      icon:'✈️', grad:'linear-gradient(145deg,#1a2a4a,#2a5a8b)'},
  {id:'recipe',      icon:'📖', grad:'linear-gradient(145deg,#2a1a3a,#6a2a8b)'},
  {id:'celebration', icon:'🎉', grad:'radial-gradient(ellipse at top,#3a1a4a,#1a0a2a)'},
  {id:'nature',      icon:'🌿', grad:'linear-gradient(145deg,#1a2a1a,#2a4a2a)'},
];

// ══════════════════════════════════════════════════
//  ESTADO
// ══════════════════════════════════════════════════
let notes = [];
let zTop  = 100;
let editingId    = null;
let ctPanelOpen  = false;
let savedRange   = null;
let searchQuery  = '';

const canvas = document.getElementById('canvas');

// ══════════════════════════════════════════════════
//  PERSISTENCIA
// ══════════════════════════════════════════════════
function save() {
  try { localStorage.setItem('keep_free_v1', JSON.stringify(notes)); } catch(e) {}
}
function load() {
  try {
    const d = localStorage.getItem('keep_free_v1');
    if (d) notes = JSON.parse(d);
  } catch(e) { notes = []; }
}

// ══════════════════════════════════════════════════
//  RENDER
// ══════════════════════════════════════════════════
function render(q='') {
  searchQuery = q.toLowerCase().trim();
  canvas.innerHTML = '';

  const visible = searchQuery
    ? notes.filter(n => (n.title+' '+stripHtml(n.body)).toLowerCase().includes(searchQuery))
    : notes;

  visible.forEach(n => canvas.appendChild(makeNota(n)));
  document.getElementById('emptyHint').style.display = notes.length===0 ? 'block' : 'none';
}

function stripHtml(h='') {
  const d = document.createElement('div'); d.innerHTML=h; return d.textContent||'';
}
function esc(s='') {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ══════════════════════════════════════════════════
//  CREAR NOTA DOM
// ══════════════════════════════════════════════════
function makeNota(note) {
  const el = document.createElement('div');
  el.id = 'n-'+note.id;
  el.dataset.id = note.id;

  // Clase color/tema
  let cls = 'nota' + (note.pinned?' pinned':'');
  if (note.theme && note.theme!=='none') cls += ' nt-'+note.theme;
  else if (note.color && note.color!=='none') cls += ' nc-'+note.color;
  el.className = cls;

  // Posición
  el.style.cssText = `left:${note.x}px;top:${note.y}px;width:${note.w||220}px;z-index:${note.z||100}`;

  const titleHtml = note.title ? `<div class="nota-title">${esc(note.title)}</div>` : '';
  const bodyHtml  = note.body  ? `<div class="nota-text">${note.body}</div>` : '';

  el.innerHTML = `
    <div class="nota-head">
      <div class="nota-drag">
        <span></span><span></span><span></span>
        <span></span><span></span><span></span>
      </div>
      <div class="nota-pin">📌</div>
      <button class="nota-menu-btn" onclick="openEditorFromCard(event,'${note.id}')">✏️</button>
    </div>
    <div class="nota-body" onclick="openEditorFromCard(event,'${note.id}')">
      ${titleHtml}${bodyHtml}
    </div>
    <div class="nota-actions">
      <button class="nota-btn" onclick="qPin(event,'${note.id}')" title="${note.pinned?'Desfijar':'Fijar'}">${note.pinned?'📌':'📍'}</button>
      <button class="nota-btn" onclick="openColorFromCard(event,'${note.id}')" title="Color">🎨</button>
      <div class="nota-spacer"></div>
      <button class="nota-btn" onclick="qDelete(event,'${note.id}')" title="Eliminar">🗑️</button>
    </div>`;

  // Arrastre desde la cabecera
  enableDrag(el.querySelector('.nota-head'), el, note);

  return el;
}

// ══════════════════════════════════════════════════
//  DRAG LIBRE
// ══════════════════════════════════════════════════
function enableDrag(handle, el, note) {
  let startX, startY, origX, origY, dragging=false;

  function onStart(cx, cy) {
    startX=cx; startY=cy; origX=note.x; origY=note.y;
    dragging=true;
    note.z = ++zTop;
    el.style.zIndex = note.z;
    el.classList.add('dragging');
  }

  function onMove(cx, cy) {
    if (!dragging) return;
    const cw=canvas.clientWidth, ch=canvas.clientHeight;
    const w = parseInt(el.style.width)||220;
    note.x = Math.max(0, Math.min(cw-w,   origX+(cx-startX)));
    note.y = Math.max(0, Math.min(ch-80,   origY+(cy-startY)));
    el.style.left = note.x+'px';
    el.style.top  = note.y+'px';
  }

  function onEnd() {
    if (!dragging) return;
    dragging=false;
    el.classList.remove('dragging');
    save();
  }

  // Touch
  handle.addEventListener('touchstart', e=>{
    e.stopPropagation();
    const t=e.touches[0]; onStart(t.clientX, t.clientY-58);
  },{passive:true});

  document.addEventListener('touchmove', e=>{
    if (!dragging) return;
    e.preventDefault();
    const t=e.touches[0]; onMove(t.clientX, t.clientY-58);
  },{passive:false});

  document.addEventListener('touchend', ()=>{ if(dragging) onEnd(); });

  // Mouse
  handle.addEventListener('mousedown', e=>{
    e.stopPropagation();
    onStart(e.clientX, e.clientY-58);
  });
  document.addEventListener('mousemove', e=>{ if(dragging) onMove(e.clientX, e.clientY-58); });
  document.addEventListener('mouseup',   ()=>{ if(dragging) onEnd(); });
}

// ══════════════════════════════════════════════════
//  ACCIONES RÁPIDAS EN CARD
// ══════════════════════════════════════════════════
function openEditorFromCard(e, id) {
  e.stopPropagation();
  openEditor(id);
}
function openColorFromCard(e, id) {
  e.stopPropagation();
  openEditor(id);
  setTimeout(()=>{ ctPanelOpen=false; toggleCtPanel(); }, 360);
}
function qPin(e, id) {
  e.stopPropagation();
  const n=notes.find(x=>x.id===id); if(!n) return;
  n.pinned=!n.pinned; save();
  render(searchQuery);
  showToast(n.pinned?'Nota fijada':'Nota desfijada');
}
function qDelete(e, id) {
  e.stopPropagation();
  notes=notes.filter(x=>x.id!==id); save();
  render(searchQuery);
  showToast('Nota eliminada');
}

// ══════════════════════════════════════════════════
//  EDITOR
// ══════════════════════════════════════════════════
function openEditor(id) {
  editingId=id;
  ctPanelOpen=false;
  document.getElementById('ctPanel').classList.remove('open');

  const eTitle=document.getElementById('eTitle');
  const eBody =document.getElementById('eBody');
  const btnPin=document.getElementById('btnPin');
  const btnDel=document.getElementById('btnDel');

  if (id) {
    const n=notes.find(x=>x.id===id); if(!n) return;
    eTitle.value   = n.title||'';
    eBody.innerHTML= n.body||'';
    btnPin.style.opacity = n.pinned?'1':'0.5';
    btnDel.style.display = 'flex';
    applyEditorStyle(n.color||'none', n.theme||'none');
  } else {
    eTitle.value=''; eBody.innerHTML='';
    btnPin.style.opacity='0.5';
    btnDel.style.display='none';
    applyEditorStyle('none','none');
  }

  document.getElementById('overlay').classList.add('open');
  setTimeout(()=>eBody.focus(),320);
}

function closeEditor() {
  const eTitle = document.getElementById('eTitle').value.trim();
  const eBody  = document.getElementById('eBody').innerHTML.trim();
  const editor = document.getElementById('editor');
  const color  = editor.dataset.color||'none';
  const theme  = editor.dataset.theme||'none';
  const bodyText = stripHtml(eBody);

  if (editingId) {
    const idx=notes.findIndex(x=>x.id===editingId);
    if (idx>-1) {
      if (!eTitle && !bodyText) {
        notes.splice(idx,1); showToast('Nota vacía eliminada');
      } else {
        Object.assign(notes[idx],{title:eTitle,body:eBody,color,theme,updated:Date.now()});
      }
    }
  } else if (eTitle||bodyText) {
    const cw=canvas.clientWidth, ch=canvas.clientHeight;
    const w=220;
    notes.unshift({
      id: Date.now().toString(),
      title:eTitle, body:eBody, color, theme, pinned:false,
      x: Math.max(10,Math.min(cw-w-10, 10+Math.random()*(cw-w-20))),
      y: Math.max(10,Math.min(ch-200,  10+Math.random()*(ch-240))),
      w, z:++zTop,
      created:Date.now(), updated:Date.now()
    });
  }

  save();
  document.getElementById('overlay').classList.remove('open');
  editingId=null;
  render(searchQuery);
}

function handleOverlayClick(e) {
  if (e.target===document.getElementById('overlay')) closeEditor();
}

// ══════════════════════════════════════════════════
//  ESTILO EDITOR
// ══════════════════════════════════════════════════
function applyEditorStyle(color, theme) {
  const ed=document.getElementById('editor');
  ed.className='editor';
  ed.dataset.color=color; ed.dataset.theme=theme;
  if (theme&&theme!=='none') ed.classList.add('et-'+theme);
  else if (color&&color!=='none') ed.classList.add('ec-'+color);
  document.querySelectorAll('.cp-dot').forEach(d=>d.classList.toggle('active',d.dataset.cid===color));
  document.querySelectorAll('.th-dot').forEach(d=>d.classList.toggle('active',d.dataset.tid===theme));
}

// ══════════════════════════════════════════════════
//  FORMATO DE TEXTO
// ══════════════════════════════════════════════════
function saveRange() {
  const sel=window.getSelection();
  if (sel&&sel.rangeCount) savedRange=sel.getRangeAt(0).cloneRange();
}
function restoreRange() {
  if (!savedRange) return;
  const sel=window.getSelection(); sel.removeAllRanges(); sel.addRange(savedRange);
}

const eBodyEl = document.getElementById('eBody');
['keyup','mouseup','touchend'].forEach(ev=>eBodyEl.addEventListener(ev,()=>{saveRange();updateFmtBtns();}));

function fmt(cmd) {
  eBodyEl.focus(); restoreRange();
  document.execCommand(cmd,false,null);
  saveRange(); updateFmtBtns();
}
function fmtBlock(tag) {
  eBodyEl.focus(); restoreRange();
  document.execCommand('formatBlock',false,tag);
  saveRange();
}
function updateFmtBtns() {
  document.querySelectorAll('.fmt-btn[data-cmd]').forEach(b=>{
    b.classList.toggle('on', document.queryCommandState(b.dataset.cmd));
  });
}

// ══════════════════════════════════════════════════
//  PANEL COLOR/TEMA
// ══════════════════════════════════════════════════
function buildPanels() {
  const cr=document.getElementById('colorsRow');
  const tr=document.getElementById('themesRow');

  COLORS.forEach(c=>{
    const d=document.createElement('div');
    d.className='cp-dot'+(c.id==='none'?' cp-none':'');
    d.dataset.cid=c.id;
    if(c.bg) d.style.background=c.bg;
    d.addEventListener('click',()=>selColor(c.id));
    d.addEventListener('touchend',e=>{e.preventDefault();selColor(c.id);});
    cr.appendChild(d);
  });

  THEMES.forEach(t=>{
    const d=document.createElement('div');
    d.className='th-dot'; d.dataset.tid=t.id;
    d.textContent=t.icon;
    d.style.background=t.grad||'var(--surface2)';
    d.addEventListener('click',()=>selTheme(t.id));
    d.addEventListener('touchend',e=>{e.preventDefault();selTheme(t.id);});
    tr.appendChild(d);
  });
}

function toggleCtPanel() {
  ctPanelOpen=!ctPanelOpen;
  document.getElementById('ctPanel').classList.toggle('open',ctPanelOpen);
}
function selColor(id) {
  applyEditorStyle(id,'none');
  if(editingId){const n=notes.find(x=>x.id===editingId);if(n){n.color=id;n.theme='none';save();render(searchQuery);}}
}
function selTheme(id) {
  applyEditorStyle('none',id);
  if(editingId){const n=notes.find(x=>x.id===editingId);if(n){n.theme=id;n.color='none';save();render(searchQuery);}}
}

// ══════════════════════════════════════════════════
//  PIN
// ══════════════════════════════════════════════════
function togglePin() {
  if(!editingId) return;
  const n=notes.find(x=>x.id===editingId); if(!n) return;
  n.pinned=!n.pinned;
  document.getElementById('btnPin').style.opacity=n.pinned?'1':'0.5';
  save(); render(searchQuery);
  showToast(n.pinned?'Nota fijada':'Nota desfijada');
}

function deleteCurrentNote() {
  if(!editingId) return;
  notes=notes.filter(x=>x.id!==editingId); save();
  document.getElementById('overlay').classList.remove('open');
  editingId=null; render(searchQuery);
  showToast('Nota eliminada');
}

// ══════════════════════════════════════════════════
//  BÚSQUEDA
// ══════════════════════════════════════════════════
document.getElementById('searchInput').addEventListener('input',e=>render(e.target.value));

// ══════════════════════════════════════════════════
//  BACKUP
// ══════════════════════════════════════════════════
function openBackup(){document.getElementById('bkOverlay').classList.add('open')}
function closeBackup(){document.getElementById('bkOverlay').classList.remove('open')}

function exportNotes(){
  const data=JSON.stringify({version:3,exported:new Date().toISOString(),notes},null,2);
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([data],{type:'application/json'}));
  a.download=`mis-notas-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  closeBackup(); showToast('✅ Notas exportadas');
}
function importNotes(e){
  const file=e.target.files[0]; if(!file) return;
  const r=new FileReader();
  r.onload=ev=>{
    try{
      const data=JSON.parse(ev.target.result);
      const imp=Array.isArray(data)?data:(data.notes||[]);
      const ex=new Set(notes.map(n=>n.id));
      let added=0;
      imp.forEach(n=>{
        if(!ex.has(n.id)){
          // Asignar posición si no tiene
          if(n.x===undefined){n.x=20+Math.random()*200;n.y=20+Math.random()*200;}
          notes.push(n); added++;
        }
      });
      save(); render(searchQuery);
      closeBackup(); showToast(`✅ ${added} nota${added!==1?'s':''} importada${added!==1?'s':''}`);
    } catch{ showToast('❌ Archivo no válido'); }
    e.target.value='';
  };
  r.readAsText(file);
}

// ══════════════════════════════════════════════════
//  TOAST
// ══════════════════════════════════════════════════
let tt;
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(tt); tt=setTimeout(()=>t.classList.remove('show'),2500);
}

// ══════════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════════
load();
buildPanels();
render();
</script>
